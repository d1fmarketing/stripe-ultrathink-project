<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StripedShield - Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent">
                StripedShield
            </h1>
            <p class="text-gray-600 mt-2">Win 68% of chargebacks with AI</p>
        </div>
        
        <!-- Auth Container -->
        <div id="authContainer">
            <!-- Login Form -->
            <div id="loginForm" class="space-y-4">
                <h2 class="text-xl font-semibold text-gray-800">Welcome Back</h2>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="loginEmail" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                           placeholder="you@company.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="loginPassword" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                           placeholder="••••••••">
                </div>
                
                <button onclick="handleEmailLogin()" 
                        class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition">
                    Sign In
                </button>
                
                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>
                
                <!-- Google OAuth Button -->
                <button onclick="handleGoogleLogin()" 
                        class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 rounded-lg font-semibold hover:bg-gray-50 transition">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>
                
                <!-- Switch to Signup -->
                <p class="text-center text-sm text-gray-600 mt-6">
                    Don't have an account? 
                    <button onclick="showSignup()" class="text-purple-600 font-semibold hover:text-purple-700">
                        Start Free Trial
                    </button>
                </p>
            </div>
            
            <!-- Signup Form (Hidden by default) -->
            <div id="signupForm" class="space-y-4 hidden">
                <h2 class="text-xl font-semibold text-gray-800">Start Your Free Trial</h2>
                <p class="text-sm text-gray-600">7 days free, then $599/month</p>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                    <input type="text" id="signupCompany" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                           placeholder="Your Company">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="signupEmail" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                           placeholder="you@company.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="signupPassword" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                           placeholder="Min 8 characters">
                </div>
                
                <button onclick="handleSignup()" 
                        class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
                    Start Free Trial
                </button>
                
                <!-- Google Signup -->
                <button onclick="handleGoogleLogin()" 
                        class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 py-3 rounded-lg font-semibold hover:bg-gray-50 transition">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign up with Google
                </button>
                
                <!-- Switch to Login -->
                <p class="text-center text-sm text-gray-600 mt-6">
                    Already have an account? 
                    <button onclick="showLogin()" class="text-purple-600 font-semibold hover:text-purple-700">
                        Sign In
                    </button>
                </p>
            </div>
        </div>
        
        <!-- Error/Success Messages -->
        <div id="messageContainer" class="mt-4"></div>
    </div>
    
    <!-- Firebase SDK v9 (Modular) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBGemDqwlwE4v0tZ7RXttJsW9l_0YrtBNA",
            authDomain: "stripecharge-b27a6.firebaseapp.com",
            projectId: "stripecharge-b27a6",
            storageBucket: "stripecharge-b27a6.firebasestorage.app",
            messagingSenderId: "573857361404",
            appId: "1:573857361404:web:50dab6d2b28c441cae5679",
            measurementId: "G-27XBNSG2Z9"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        
        // Make functions available globally
        window.auth = auth;
        window.googleProvider = googleProvider;
        
        // Form switching functions
        window.showLogin = function() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('signupForm').classList.add('hidden');
        }
        
        window.showSignup = function() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
        }
        
        // Show message
        window.showMessage = function(message, type = 'info') {
            const container = document.getElementById('messageContainer');
            const bgColor = type === 'error' ? 'bg-red-50 text-red-700' : 'bg-green-50 text-green-700';
            container.innerHTML = `
                <div class="${bgColor} px-4 py-3 rounded-lg text-sm">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        // Handle Email Login
        window.handleEmailLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard-protected.html';
                }, 1500);
            } catch (error) {
                console.error('Login error:', error);
                showMessage(error.message || 'Login failed', 'error');
            }
        }
        
        // Handle Signup
        window.handleSignup = async function() {
            const company = document.getElementById('signupCompany').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!company || !email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // TODO: Save company name to Firebase Database/Firestore
                localStorage.setItem('companyName', company);
                
                showMessage('Account created! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/checkout.html';
                }, 1500);
            } catch (error) {
                console.error('Signup error:', error);
                showMessage(error.message || 'Signup failed', 'error');
            }
        }
        
        // Handle Google Login
        window.handleGoogleLogin = async function() {
            console.log('🔥 ULTRATHINK: Google OAuth via Firebase');
            
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                console.log('✅ Google login successful:', user.email);
                showMessage('Google login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = '/dashboard-protected.html';
                }, 1500);
                
            } catch (error) {
                console.error('Google login error:', error);
                
                // Handle specific errors
                if (error.code === 'auth/popup-closed-by-user') {
                    showMessage('Login cancelled', 'error');
                } else if (error.code === 'auth/popup-blocked') {
                    showMessage('Popup blocked. Please allow popups for this site.', 'error');
                } else {
                    showMessage(error.message || 'Google login failed', 'error');
                }
            }
        }
        
        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('User already logged in:', user.email);
                // Optionally redirect to dashboard
                // window.location.href = '/dashboard-protected.html';
            }
        });
        
        console.log('🚀 Firebase Auth initialized and ready!');
    </script>
</body>
</html>
